<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaboration</title>
    <link href="collaboration.css" rel="stylesheet">
</head>
<body>
    <div id="dashboard-content">  
    <div id="headies">
        <p id="nav"></p>
        <div id="navigation-bar"><p class="navigation-bar-item" id="navigation-bar-dashbord">DASHBORD</p><p class="navigation-bar-item" id="navigation-bar-repository">REPOSITORY</p><p class="navigation-bar-item" id="navigation-bar-forms">FORMS</p><p class="navigation-bar-item" id="navigation-bar-collaboration">COLLABORATION</p></div>
        <h4 id="place">COLLABORATION</h4>
        <p id="profile"></p>
        <p id="nav-username">Username</p>
        <div id="signout"><p id="signout-login-id">login-id</p><p id="signout-button-click">signout</p><button id="signout-button" type="submit"></div>

    </div>

    <div id="bodies">
        <div id="scroolbar">
            <div class="scroolbar_option" id="scroolbar_option_recruit">RECRUIT</div>
            <div class="scroolbar_option" id="scroolbar_option_mine">MINE</div>

        </div>
        <div id="chatbox">
            <div id="heading_of_chatbox">RECRUIT</div>
            <div id="feature_block">
                <p id="Addi">+ ADD</p>
            </div>
             <div id="mine_part"></div>
            <div id="floating">
                <form id="new_file">
                    <p id="item-1_new_file" class="item_new_file">
                    TITLE:<input type="text" placeholder="Title (3-25 letter)">
                    </p>
                    <p id="item-2_new_file" class="item_new_file">
                    E-MAIL:<input type="email" placeholder="Reffred emil" readonly>
                    </p>
                    <p id="item-3_new_file" class="item_new_file" >
                    DISCRIPTION:<textarea id="description"></textarea>10-250 words
                    </p>
                    <p id="item-4_new_file" class="item_new_file">
                        <span id="Asli_khel">Select File</span>
                        <input type="file" id="submit_file_new_file">
                    </p>
                    <p id="item-5_new_file" class="item_new_file">
                        <button type="submit" id="submit_of_new_repo">SUBMIT</button>
                    </p>

                    <input type="number" min="1" max="3" id="noofrecruits" placeholder="recruit number">
                    <p id="cross">X</p>
                </form>
            </div>
        </div>
        
        
    
    </div>




    <script src="collaboration.js" type="module"></script>
    
</body>
</html>
