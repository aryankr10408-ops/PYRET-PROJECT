<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashbord</title>
    <link href="dashbord.css" rel="stylesheet">
</head>
<body>
    <div id="headies">
        <p id="nav"></p>
        <div id="navigation-bar"><p class="navigation-bar-item" id="navigation-bar-dashbord">DASHBORD</p><p class="navigation-bar-item" id="navigation-bar-repository">REPOSITORY</p><p class="navigation-bar-item" id="navigation-bar-forms">FORMS</p><p class="navigation-bar-item" id="navigation-bar-collaboration">COLLABORATION</p></div>
        <h4 id="place">DASHBORD</h4>
        <p id="profile"></p>
        <p id="nav-username">Username</p>
    </div>
    <div id="bodyies">
    <div id="info">
        <p class="content" id="Item1">
            <span>Username:</span>
        <input type="text" placeholder="Username" id="username-input">
        <a href="#">Forgot password?</a>
        <span class="changes" id="change-username">
            <br>
            <button type="submit" >CHANGE</button>
        </span>
        </p>
        <p class="content" id="Item2">
            <span>Age:</span>
        <input type="number" placeholder="age">
        <span class="changes" id="change-age">
            <br>
            <button type="submit" >CHANGE</button>
        </span>
        </p>
        <p class="content" id="Item3">
            <span>Login:</span>
        <input type="email" placeholder="email">
        <span class="changes" id="change-email">
            <br>
            <button type="submit" >CHANGE</button>
        </span>

        </p>
        <p class="content" id="Item4">
            <span>Name:</span>
        <input type="text" placeholder="name">
        <span class="changes" id="change-name">
            <br>
            <button type="submit" >CHANGE</button>
        </span>
        </p>
        <p class="content" id="Item5">
            <span>Gender:</span>
        <input type="text" placeholder="gender">
        <span class="changes" id="change-gender">
            <br>
            <button type="submit" >CHANGE</button>
        </span>
        </p>
        <p class="content" id="Item6">
            <span>Degree:</span>
        <input type="text" placeholder="degree">
        <span class="changes" id="change-degree">
            <br>
            <button type="submit" >CHANGE</button>
        </span>
        </p>
        <p class="content" id="Item7">
            <span>Year:</span>
        <input type="text" placeholder="year">
        <span class="changes" id="change-year">
            <br>
            <button type="submit" >CHANGE</button>
        </span>
        </p>
    </div>
    <div id="profile-image">
        <!-- <p id="change-profile-pic"> </p> -->
    <img src="Screenshot 2026-07-03 at 4.46.51 PM.png" id="img-profile">
    <div id="change-option">
        <p id="change-option-p">CHANGE</p>
    
    </div>
    <span id="url-link">
        <input type="text" placeholder="url-link">
        <button type="submit" class="changes" id="url-link-button">Change</button>
    </span>
    </div>
    
    <script src="dashbord.js"></script>
    
</body>
</html>
